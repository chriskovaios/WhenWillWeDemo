<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <!-- Static manifest from public/ — guaranteed to ship even if
         vite-plugin-pwa is misconfigured. Relative path so it resolves
         under whatever VITE_BASE_PATH the build used. -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a0b2e" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WhenWillWe" />
    <title>WhenWillWe</title>
    <meta name="description" content="A private scheduling tool for couples." />
    <script>
      // Pre-paint theme flash prevention. Reads stored theme or falls back to system.
      (function () {
        try {
          const stored = localStorage.getItem("ww-theme");
          const theme = stored && stored !== "system" ? stored : null;
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const resolved = theme ?? (prefersDark ? "plum-dark" : "lavender-light");
          document.documentElement.setAttribute("data-theme", resolved);
          document.documentElement.classList.toggle(
            "dark",
            resolved.endsWith("-dark")
          );
        } catch {}
      })();
    </script>
    <script type="module" crossorigin src="/WhenWillWeDemo/assets/index-B0V06fpb.js"></script>
    <link rel="stylesheet" crossorigin href="/WhenWillWeDemo/assets/index-B0sIQH-g.css">
  </head>

    <div id="root"></div>
  </body>
</html>
